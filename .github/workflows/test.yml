name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --dev

      - name: Check Python formatting
        run: ./scripts/check_format.sh

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --dev

      - name: Check Python lint
        run: ./scripts/check_lint.sh

  tui:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: |
          corepack enable
          corepack install --global pnpm@11.11.0

      - name: Set up Bun for OpenTUI
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Install TUI dependencies
        run: pnpm install --frozen-lockfile

      - name: Check TypeScript formatting and lint
        run: pnpm check:ts

      - name: Test repository launcher
        run: ./vs --headless --help >/dev/null

      - name: Check generated protocol bindings
        run: |
          pnpm --dir clients/tui generate:protocol
          git diff --exit-code -- clients/tui/src/generated/protocol.schema.json clients/tui/src/generated/protocol.generated.ts

      - name: Check TypeScript
        run: pnpm --dir clients/tui check

      - name: Test TUI
        run: pnpm --dir clients/tui test

      - name: Build TUI
        run: pnpm --dir clients/tui build

  queue-native:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: examples/evaluators/queue/go.mod
          cache-dependency-path: examples/evaluators/queue/go.sum

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.78.0
        with:
          components: clippy, rustfmt

      - name: Check native runner formatting
        working-directory: examples/evaluators/queue/native_runner
        run: cargo fmt -- --check

      - name: Lint native runner
        working-directory: examples/evaluators/queue/native_runner
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Test native runner
        working-directory: examples/evaluators/queue/native_runner
        run: cargo test --locked

      - name: Check starter formatting
        working-directory: examples/starters/queue-rs
        run: cargo fmt -- --check

      - name: Lint starter
        working-directory: examples/starters/queue-rs
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Test starter
        working-directory: examples/starters/queue-rs
        run: cargo test --locked

      - name: Test queue evaluator
        working-directory: examples/evaluators/queue
        run: go test -race ./...

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run python -m pytest -v --cov=vibesys --cov=vs_issue_board --cov-report=term-missing --cov-report=xml --cov-fail-under=75

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  # Exercises the real Linux workspace-confinement boundary (issue #149). The
  # main `test` job skips these (no bubblewrap), so this job installs it and
  # forces the tests to run — VIBESYS_REQUIRE_SANDBOX_TESTS=1 turns a missing or
  # broken sandbox into a failure instead of a silent skip.
  sandbox-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install bubblewrap
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap
          # Ubuntu 24.04 restricts unprivileged user namespaces via AppArmor;
          # relax it so bwrap can create the namespace on the runner.
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --dev

      - name: Run workspace-confinement tests
        env:
          VIBESYS_REQUIRE_SANDBOX_TESTS: "1"
        run: uv run python -m pytest tests/_agent_cli/test_hostsandbox.py -v

  patch-coverage:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --dev

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml

      - name: Check patch coverage
        run: uv run diff-cover coverage.xml --compare-branch=origin/${{ github.base_ref }} --fail-under=80
