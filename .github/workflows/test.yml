name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --dev

      - name: Check Python formatting
        run: ./scripts/check_format.sh

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --dev

      - name: Check Python lint
        run: ./scripts/check_lint.sh

  queue-native:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: examples/evaluators/queue/go.mod
          cache-dependency-path: examples/evaluators/queue/go.sum

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.78.0
        with:
          components: clippy, rustfmt

      - name: Check native runner formatting
        working-directory: examples/evaluators/queue/native_runner
        run: cargo fmt -- --check

      - name: Lint native runner
        working-directory: examples/evaluators/queue/native_runner
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Test native runner
        working-directory: examples/evaluators/queue/native_runner
        run: cargo test --locked

      - name: Check starter formatting
        working-directory: examples/starters/queue-rs
        run: cargo fmt -- --check

      - name: Lint starter
        working-directory: examples/starters/queue-rs
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Test starter
        working-directory: examples/starters/queue-rs
        run: cargo test --locked

      - name: Test queue evaluator
        working-directory: examples/evaluators/queue
        run: go test -race ./...

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run python -m pytest -v --cov=vibe_serve --cov=vs_issue_board --cov-report=term-missing --cov-report=xml --cov-fail-under=75

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  patch-coverage:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --dev

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml

      - name: Check patch coverage
        run: uv run diff-cover coverage.xml --compare-branch=origin/${{ github.base_ref }} --fail-under=80
