Instruction:
  description: Instructions executed on NeuronCore compute engines.
  properties:
    #
    # Common fields used by all engines
    #
    start_ts: # previously named "start"
      type: integer
      format: int64 # previously uint64
      description: Timestamp when instruction started execution.
      x-unit: nanoseconds
      minimum: 0

    end_ts: # previously named "end"
      type: integer
      format: int64 # previously uint64
      description: Timestamp when instruction finished execution.
      x-unit: nanoseconds
      minimum: 0

    duration_ns: # previously named "duration"
      type: integer
      format: int64 # previously uint64
      description: Duration of instruction execution.
      x-unit: nanoseconds
      minimum: 0

    engine:
      type: string
      description: Compute engine that executed this instruction.
      example: tensor

    timeline_track:
      type: string
      description: The name of the timeline track that this instruction appears on in the Neuron Explorer web UI.
      example: TensorMatrix

    pcore_idx: # previously named "subgraph"
      type: integer
      format: int64
      description: Index of the physical NeuronCore within a Logical NeuronCore (LNC). A Logical NeuronCore is a group of physical NeuronCores. For LNC2 this field can have a value of either 0 or 1.
      minimum: 0

    opcode:
      type: string
      description: Opcode for the instruction.
      example: DRAIN

    operands:
      type: string
      description: Input operands for the instruction.
      example: data=0xd,0xd size=4,4 dst=0xffff026f038,0xffff024f038

    compiler_opcode:
      type: string
      description: |
        Opcode of the instruction at compile time. The "compiler_opcode" and the runtime "opcode" can be different because certain missing or dynamic information is filled in at runtime. For example, the "comiler_opcode: PSEUDO_DMA_TRIGGER" may change to "opcode: WRITE" at runtime because that is when the write address is known.
      example: PSEUDO_DMA_TRIGGER

    compiler_operands:
      type: string
      description: |
        Operands of the instruction at compile time. The "compiler_operands" and the runtime "operands" can be different because certain missing or dynamic information is filled in at runtime. For example, the a compiler_opcode PSEUDO_DMA_TRIGGER with "comiler_operands: qSyncPIOParam0 block_id=1" may change to a opcode WRITE with "operands: data=0x1,0x1 size=4,4 dst=0xffff1009038,0xffff1029038" at runtime because that is when the write address is known.
      example: name=sg0000 args_table_var_id=0

    id:
      type: integer
      format: int64 # previously uint64
      description: Unique identifier for this instruction execution.
      minimum: 0

    pc:
      type: integer # previously string
      format: int64
      description: The runtime program counter is this instruction index on the given engine.
      minimum: 0

    compiler_pc:
      type: integer # previously string
      format: int64
      description: The compiler program counter is this instruction index on the given engine. The "compiler_pc" and the runtime "pc" can be different because the compiler can have instructions that are unrolled at runtime. Or the compiler can have a collective communication operation that is fulfilled by multiple runtime instructions.
      minimum: 0

    penguin_id:
      type: string
      description: Penguin compiler ID containing both raw ID and context information.
      example: sg0000:83

    raw_penguin_id:
      type: integer # previously string
      format: int64
      description: Raw internal penguin compiler identifier.
      minimum: 0

    bir_id:
      type: string
      description: Binary Intermediate Representation instruction identifier.
      example: sg0000:218805

    raw_bir_id:
      type: integer # previously string
      format: int64
      description: Unprocessed Binary Intermediate Representation ID containing both raw ID and context information. This is a 64-bit integer stored as a string. Bits 63:48 encode the subgraph ID. Bits 47:32 encode the function ID. Bits 31:0 encode the instruction ID within the function.
      minimum: 0

    bir_instruction_name:
      type: string
      description: Name of the BIR instruction from the name in the BIR debug info.
      example: I-83-1_sg0001

    kernel_instruction_name:
      type: string
      description: Unique kernel instruction identifier formatted as 'bir_instruction_name:parent_tensorizer_id', where parent_tensorizer_id is the parent penguin instruction ID for this instruction. Corresponds to the 'kernel_instruction_name' field in the KernelInstructions table.
      example: inst.42:67

    crc_in:
      type: integer
      format: int64 # previously uint32
      description: In CRC for integrity checking. It is a 16-bit hash value for the input data of this instruction. The crc_in value should match between runs for the same exact instruction call.
      minimum: 0

    crc_out:
      type: integer
      format: int64 # previously uint32
      description: Out CRC for integrity verification. It is a 16-bit hash value for the output data of this instruction. The crc_out value should match between runs for the same exact instruction call.
      minimum: 0

    evt_wait_time_ns: # previously named "evt_wait_time"
      type: integer
      format: int64
      description: Time spent waiting for events or synchronization. The duration between the time the instruction is ready to be pushed into the engine execution queue and the time the event/semaphore condition is met.
      x-unit: nanoseconds
      minimum: 0

    hlo_attrs:
      type: string
      description: The debug info associated with the HLO instruction that produced this instruction.
      example: transpose=true,axis=[0,2,1]

    hlo_name:
      type: string
      description: High-Level Optimizer (HLO) operation name.
      example: dot.1

    raw_hlo_id:
      type: integer
      format: int64
      description: Unique identifier for hlo level instruction.
      minimum: 0

    layer:
      type: string
      description: Here "layer" means the name from the framework level debug info.
      example: layer_1

    stack_frame_ids:
      type: string
      description: List of stack frame identifiers for debugging. An instruction can map back to multiple stack frame ids due to compiler optimizations such as operator fusion.
      example: "[101, 102, 103]"

    nki_source_location:
      type: string
      description: Neuron Kernel Interface (NKI) source code location that generated this instruction. This is a list of strings because an instruction can map back to multiple source locations due to compiler optimizations such as operator fusion.
      example: file.py:42

    bir_debug_info_source_location:
      type: string
      description: Source code location recorded in BIR debug info. This field can reference various source file types including NKI files, non-NKI Python files, and C++ files.
      example: file.py:42

    dma_trigger_start_ts: # previously named "trigger"
      type: integer
      format: int64 # previously uint64
      description: Start timestamp of the DMA that this instruction triggered.
      minimum: 0

    dma_trigger_end_ts: # previously named "completion"
      type: integer
      format: int64 # previously uint64
      description: End timestamp of the DMA that this instruction triggered.
      minimum: 0

    dma_wait_time_ns: # previously named "dma_wait_time"
      type: integer
      format: int64 # previously uint64
      description: The amount of time delay between the end timestamp of the trigger compute engine instruction to the start timestamp of the DMA that was triggered.
      x-unit: nanoseconds
      minimum: 0

    instruction_chain: # previously named "instruction_chain_[0,1,2,...]"
      type: string
      description: List of instructions in this chain. Some instructions must be executed together in a sequential order such as custom operations or pseuodo operations. This field lists all instructions in the executed chain in the following format "compiler_opcode compiler_operands\n". Newline is used to separate instructions in the chain.
      example: PSEUDO_TRIGGER_COLLECTIVE_2 $S[15]>=1 $S[15]++@complete ctype=ALL_REDUCE op=ADD dtype=bfloat16 cc_dim=0 src0_var_id=1353 src0_var_offset=0 src0_shape_reg=0 src0_pattern=[1,1][8192,1]\n PSEUDO_EXTENSION group_id=0 channel_id=0 stream_id=0 dst_var_id=1354 dst_var_offset=0 dst_shape_reg=0 dst_pattern=[1,1][8192,1]

    hbm_read_bytes:
      type: integer
      format: int64
      description: Number of bytes read from HBM by this instruction.
      minimum: 0

    hbm_write_bytes:
      type: integer
      format: int64
      description: Number of bytes written to HBM by this instruction.
      minimum: 0

    sbuf_read_bytes:
      type: integer
      format: int64
      description: Number of bytes read from SBUF by this instruction.
      minimum: 0

    sbuf_write_bytes:
      type: integer
      format: int64
      description: Number of bytes written to SBUF by this instruction.
      minimum: 0

    spill_save_bytes:
      type: integer
      format: int64
      description: Number of bytes saved to HBM from SBUF by this instruction due to spill (lack of space in SBUF).
      minimum: 0

    spill_reload_bytes:
      type: integer
      format: int64
      description: Number of bytes loaded from HBM to SBUF by this instruction due to spill (lack of space in SBUF).
      minimum: 0

    psum_read_bytes:
      type: integer
      format: int64
      description: Number of bytes read from PSUM by this instruction.
      minimum: 0

    psum_write_bytes:
      type: integer
      format: int64
      description: Number of bytes read from PSUM by this instruction.
      minimum: 0

    is_psum_read_sbuf_write:
      type: boolean
      description: True if the instruction reads from PSUM into SUBF, otherwise null.
      example: True

    psum_read_sbuf_write_bytes:
      type: integer
      format: int64
      description: Number of bytes read from PSUM into SBUF by this instruction.
      minimum: 0

    input_queue_bytes:
      type: integer
      format: int64
      description: Number of bytes loaded from an INPUT DMA queue by this instruction.
      minimum: 0

    output_queue_bytes:
      type: integer
      format: int64
      description: Number of bytes loaded from an OUTPUT DMA queue by this instruction.
      minimum: 0

    weight_queue_bytes:
      type: integer
      format: int64
      description: Number of bytes loaded from a DATA / WEIGHT DMA queue by this instruction.
      minimum: 0

    #
    # Tensor engine specific fields
    #
    tensor_instruction_type: # previously named "instruction_type"
      type: string
      description: Instruction type name from the debug info.
      example: ["REGULAR", "TRANSPOSE"]

    tensor_elements: # previously named "elements"
      type: integer
      format: int64
      description: Do not use this field, it will eventually be deprecated as it can be misleading depending on data type and architecture, instead use raw_flops and adjusted_flops. Number of data elements processed by this instruction. Can be used to get total size of a MATMUL operation. For example a MATMUL with vector sizes 128 * 128 has 16384 elements.
      minimum: 0

    raw_flops:
      type: integer
      format: int64
      description: >
        Number of floating-point operations (FLOPs) performed by this instruction. Each MAC (multiply-accumulate)
        operation counts as 2 FLOPs (one multiply, one add). Note that as each FP32 matmul lowers to two FP32_LO_HI instructions,
        each FP32_LO_HI matmul records half the logical FLOPs.
      minimum: 0

    adjusted_flops:
      type: integer
      format: int64
      description: >
        BF16-equivalent FLOPs for this instruction. Scales FLOPs to the BF16 throughput equivalent so the result can be used with BF16 peak throughput as the denominator for PE utilization calculations. BF16, FP16, and TF32 use a 1.0x multiplier. FP32 uses 4.0x. FP8 uses 1.0x on Trn1/Inf2 and 0.5x on Trn2/Trn3. UINT8 uses 0.5x. MXFP8 and MXFP4 use 0.25x on Trn3.
      minimum: 0

    tensor_elements_transpose:
      type: integer
      format: int64
      description: >
        Number of data elements processed by this instruction, only set when tensor_instruction_type is TRANSPOSE.
        0 for non-transpose instructions.
      minimum: 0

    flops_transpose:
      type: integer
      format: int64
      description: >
        Number of transpose floating-point operations (FLOPs) performed by this instruction, only set when
        tensor_instruction_type is TRANSPOSE. 0 for non-transpose instructions.
      minimum: 0

    adjusted_flops_transpose:
      type: integer
      format: int64
      description: >
        BF16-equivalent transpose FLOPs for this instruction, only set when tensor_instruction_type is TRANSPOSE and 0 otherwise. Uses the same scaling multipliers as adjusted_flops. BF16, FP16, and TF32 use a 1.0x multiplier. FP32 uses 4.0x. FP8 uses 1.0x on Trn1/Inf2 and 0.5x on Trn2/Trn3. UINT8 uses 0.5x. MXFP8 and MXFP4 use 0.25x on Trn3.
      minimum: 0

    #
    # Scalar engine specific fields
    #
    scalar_activation_fn: # previously named "activation_fn"
      type: string
      description: Type of activation function used.
      example: COPY

  required:
    - start_ts
    - end_ts
    - duration_ns
    - id
    - bir_id
    - pc
    - engine
    - opcode
    - operands
