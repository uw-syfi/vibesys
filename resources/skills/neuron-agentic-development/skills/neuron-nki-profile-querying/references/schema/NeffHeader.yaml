NeffHeader: # The profile data that fills this table is generated by ingestNeffInfo() in ingest.go
  description: Information contained in the NEFF header.
  properties:
    network_name:
      type: string
      description: Name of the NEFF.
      example: file.neff

    uuid:
      type: string
      description: Unique identifier of the NEFF.
      example: ae5a8d94ac9c4104b0e01ece540d4097

    hash:
      type: string
      description: Hash of the NEFF.
      example: 6879b275cffd23c20fa431a0b1472002

    enabled_features:
      type: string
      description: Comma-separated list of enabled features.
      example: coalesced-cc, queue-set-instances, on-chip-functions

    header_size:
      type: integer
      format: int64
      description: Size of the NEFF header in bytes.
      x-unit: bytes
      minimum: 0

    data_size:
      type: integer
      format: int64
      description: Data size in bytes.
      x-unit: bytes
      minimum: 0

    major_version:
      type: integer
      format: int64
      description: NEFF major version number.
      minimum: 0

    minor_version:
      type: integer
      format: int64
      description: NEFF minor version number.
      minimum: 0

    package_version:
      type: string
      description: Package version.
      example: 0

    build_version:
      type: string
      description: Build version.
      example: 0

    cc_participant_count:
      type: integer
      format: int64
      description: Number of collective communication (CC) participants involved.
      minimum: 0

    neuroncore_count:
      type: integer
      format: int64
      description: Number of NeuronCores used by the NEFF.
      minimum: 0

    logical_neuroncore_count:
      type: integer
      format: int64
      description: Number of Logical NeuronCores used by the NEFF.
      minimum: 0

    pcore_count_per_lnc:
      type: integer
      format: int64
      description: Number of physical NeuronCores per Logical NeuronCore (LNC).
      minimum: 0
