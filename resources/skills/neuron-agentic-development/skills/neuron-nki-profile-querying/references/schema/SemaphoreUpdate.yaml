SemaphoreUpdate:
  description: Semaphore state changes used for synchronization between operations.
  properties:
    timestamp:
      type: integer
      format: int64
      description: Timestamp when the semaphore update occurred.
      x-unit: nanoseconds
      minimum: 0

    id:
      type: string
      description: Unique identifier of the semaphore being updated.
      example: TODO

    value:
      type: integer
      format: int32
      description: New value assigned to the semaphore.
      minimum: 0

    pcore_idx: # previously named "subgraph"
      type: integer
      format: int64
      description: Index of the physical NeuronCore within a Logical NeuronCore (LNC). A Logical NeuronCore is a group of physical NeuronCores. For LNC2 this field can have a value of either 0 or 1.
      minimum: 0

  required:
    - timestamp
    - id
    - value