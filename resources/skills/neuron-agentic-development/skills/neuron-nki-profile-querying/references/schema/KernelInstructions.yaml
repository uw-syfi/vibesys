KernelInstructions:
  description: |
    Kernel instructions with references to their call stack and iteration context. Each row represents one instruction that references stack frames and iteration variables defining its execution context.
    
    Example: Instruction "inst.72:0" located at line 76 of mlp_with_mm_kernel.py, with stack_frame_id=42 (linking to KernelStackFrames table), iteration_variables_id=156 (linking to KernelIterationVariables table), stack_frame_depth=1 (single function in call stack), iteration_variable_depth=2 (inside two nested loops).
  properties:
    kernel_instruction_name:
      type: string
      description: Unique kernel instruction identifier formatted as 'instruction_name:parent_tensorizer_id', where parent_tensorizer_id is the parent penguin instruction ID for this instruction. parent_tensorizer_id refers to the parent. 
      example: inst.72:0

    stack_frame_id:
      type: integer
      format: int64
      description: Reference to the deepest stack frame in the call stack for this instruction. Links to the KernelStackFrames table. Null if no stack frame information is available.
      example: 42

    stack_frame_depth:
      type: integer
      format: int64
      description: Total depth of the call stack (number of frames in the stack).
      example: 1

    iteration_variables_id:
      type: integer
      format: int64
      description: Reference to the innermost iteration variable in the nested loop structure for this instruction. Links to the KernelIterationVariables table. Null if no iteration variable information is available.
      example: 156

    iteration_variable_depth:
      type: integer
      format: int64
      description: Total depth of iteration variable nesting (number of nested loops).
      example: 2

    pcore_idx:
      type: integer
      format: int64
      description: Index of the physical NeuronCore within a Logical NeuronCore (LNC). A Logical NeuronCore is a group of physical NeuronCores. For LNC2 this field can have a value of either 0 or 1.
      minimum: 0

    file_path:
      type: string
      description: Source file path where the code that generates this instruction is located.
      example: /home/ubuntu/mlp_with_mm_kernel.py

    line_number:
      type: integer
      format: int64
      description: Line number in the source file that generates this instruction.
      example: 76

  required:
    - kernel_instruction_name
