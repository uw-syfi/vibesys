Warning:
  description: Warnings produced during profile processing. Used to communicate the possibility of missing or unexpected data.
  properties:
    message:
      type: string
      description: The message displayed to users to describe the warning.
      example: Current NEFF is missing compiler metrics. Please re-compile using latest version of the compiler.

    category:
      type: string
      description: The type of warning captured during profile processing.
      example: ["Default", "Missing Data", "MisConfiguration", "Unknown"]

  required:
    - message
    - category
