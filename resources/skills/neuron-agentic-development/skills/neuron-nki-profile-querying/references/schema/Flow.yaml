Flow:
  description: Storing dependency information for rows in different or same table (such as between instructions and DMAs).
  properties:
    in_id:
      type: integer
      format: int64
      description: Unique identifier for the input flow.
      minimum: 0

    out_id:
      type: integer
      format: int64
      description: Unique identifier for the output flow.
      minimum: 0

    in_table:
      type: string
      description: Table name for the input flow.
      example: instruction

    out_table:
      type: string
      description: Table name for the output flow.
      example: dma_block

    dependency_type:
      type: string
      description: Type of dependency from the predecessor instruction.
      example: FLOW_DEPENDENCE

    gap_time:
      type: integer
      format: int64
      description: The gap time between the end of the input event and the start of the output event.
      x-unit: nanoseconds
      minimum: 0

  required:
    - in_id
    - out_id
    - in_table
    - out_table