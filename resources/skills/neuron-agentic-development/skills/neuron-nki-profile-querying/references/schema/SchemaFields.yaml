# NOTE: do not confuse this file with schema.yaml
#   - SchemaFields.yaml: Is a table that describes all fields in the schema.
#   - schema.yaml: Is the root of the schema that combines all the tables.
SchemaFields:
  description: The schema describes the data contained within the profile. Every field of every table is described in this table with details such as type, description, and more. See the "profile_schema_version" field of the Metadata table to determine the version of this schema.
  properties:
    table_name:
      type: string
      description: The table this field belongs to.
      example: Instruction

    table_description:
      type: string
      description: The description of the table this field belongs to.
      example: Instructions executed on NeuronCore compute engines.

    field_name:
      type: string
      description: The name of this field.
      example: engine

    field_description:
      type: string
      description: The description of this field.
      example: Compute engine that executed this instruction.

    field_example:
      type: string
      description: One or more examples of what value this field may hold.
      example: tensor

    field_type:
      type: string
      description: The data type of this field.
      example: string

    field_required:
      type: boolean
      description: Indicates whether this field is required according to the OpenAPI schema definition.
      example: true

    field_format:
      type: string
      description: The format provides additional detail about the data type of this field. The "string" and "boolean" types do not need a format, but other types such as "integer" can be more have a more specific format (such as "int64").
      example: int64

    field_unit:
      type: string
      description: The unit of this field.
      example: nanoseconds

    field_minimum:
      type: number
      format: float
      description: The minimum value that can be held by this field.
      example: 0

    field_maximum:
      type: number
      format: float
      description: The maximum value that can be held by this field.
      example: 100

  required:
      - table_name
      - table_description
      - field_name
      - field_description
      - field_type
      - field_required
