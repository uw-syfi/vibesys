DmaPacket:
  description: A DMA packet transfers data within a Neuron Device. A DMA packet typically transfers a portion of a tensor. Source and destination locations can be HBM, SBUF, or PSUM. The DMA packet traverses from the source location, over the AXI bus, to a DMA engine, over the AXI bus, and to the destination location. DMA packets corrospond to an aggregated DMA via the packet_aggregation_id field in the DmaPacket table which corrosponds to an id the DmaPacketAggregated table. The corrosponding row in the DmaPacketAggregated table contains more information about a packet such as the source, destination, variable name, and other values that are the same for all packets in the aggregated set of DMA packets.
  properties:
    start_ts: # previously named "start"
      type: integer
      format: int64 # previously uint64
      description: Timestamp when instruction started execution.
      x-unit: nanoseconds
      minimum: 0

    end_ts: # previously named "end"
      type: integer
      format: int64 # previously uint64
      description: Timestamp when instruction finished execution.
      x-unit: nanoseconds
      minimum: 0

    duration_ns: # previously named "duration"
      type: integer
      format: int64 # previously uint64
      description: Duration of instruction execution.
      x-unit: nanoseconds
      minimum: 0

    pcore_idx: # previously named "subgraph"
      type: integer
      format: int64
      description: Index of the physical NeuronCore within a Logical NeuronCore (LNC). A Logical NeuronCore is a group of physical NeuronCores. For LNC2 this field can have a value of either 0 or 1.
      minimum: 0

    id:
      type: integer
      format: int64
      description: Unique identifier for this DMA packet.
      minimum: 0

    packet_idx:
      type: integer
      format: int32
      description: Index of the DMA packet within the set of DMA packets which fulfill a transfer of one or more tensors.
      minimum: 0

    packet_aggregation_id:
      type: integer
      format: int64 # previously uint64
      description: Unique identifier of the row in the DmaPacketAggregated table that this packet is aggregated in. Each aggregated DMA represents the transfer of one or more tensors. The transfer is fulfilled on a Neuron Device by a set of DMA packets. See the DmaPacketAggregated table for more details. The row in the DmaPacketAggregated table with this packet_aggregation_id has more information about this packet such as the source, destination, variable name, and other values that are the same for all packets in the aggregated set of DMA packets.
      minimum: 0

    engine_idx: # previously named "dma_engine"
      type: integer
      format: int64 # previously string
      description: Index of the DMA engine that executed this DMA packet.
      minimum: 0

    read_bytes: # previously named "read_size"
      type: integer
      format: int64 # previously uint64
      description: Size in bytes of data read during this operation.
      x-unit: bytes
      minimum: 0

    write_bytes: # previously named "write_size"
      type: integer
      format: int64 # previously uint64
      description: Size in bytes of data written during this operation.
      x-unit: bytes
      minimum: 0

    transfer_bytes: # previously named "transfer_size"
      type: integer
      format: int64 # previously uint64
      description: Size in bytes of data transferred during this operation.
      x-unit: bytes
      minimum: 0

    throughput: # previously named "transfer_rate"
      type: number
      format: float
      description: The throughput of this DMA operation. This is the calculated as the amount of data transferred divided by the transfer duration.
      x-unit: bytes_per_second
      minimum: 0.0

    # TODO: move this field to DmaPacketAggregated table because fields that don't change within an aggregated group of DMAs belong there. This normalizes data and
    # gives a write time and write size performance improvement, as well as no loss of read query time according to our previous benchmarking.
    queue_type:
      type: string
      description: The type of the DMA queue that this packet belongs to. Used to identify the origin, and contents of the DMA packet. 'software_dynamic' packets are generated by the Gpsimd cores. 'hardware_dynamic' packets
                    are generated by dedicated DGE hardware. 'instruction', 'input', 'output', and 'data' packets are generated by the compiler.
      example: ["instruction", "input", "output", "data", "software_dynamic", "hardware_dynamic", "unknown"]

    crc:
      type: integer
      format: int64 # previously uint
      description: Cyclic Redundancy Check value for data integrity verification.
      example: 2847562039
      minimum: 0

  required:
    - start_ts
    - end_ts
    - duration_ns
    - id
    - packet_idx
    - packet_aggregation_id
    - read_bytes
    - write_bytes
    - transfer_bytes
    - throughput
    - queue_type
    - crc