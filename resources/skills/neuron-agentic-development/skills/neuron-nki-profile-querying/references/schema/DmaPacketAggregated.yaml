DmaPacketAggregated:
  description: Each row in this table represents an aggregation of a set DMA packets which together fulfil a transfer of one or more tensors. The duration of an aggregated DMA spans from the first start to the last end of the DMA packets in the set. The byte quantities of an aggregated DMA are the sum of the DMA packets in the set. An aggregated DMA has a unique id and a block_id that is only unique per combination of dma_engine, dma_queue, modular_flow_function, and pcore_idx. The id field in the DmaPacketAggregated table corrosponds to the packet_aggregation_id field in the DmaPacket table, linking each DMA packet to its corresponding aggregated DMA.
  properties:
    start_ts: # previously named "start"
      type: integer
      format: int64 # previously uint64
      description: Timestamp when instruction started execution.
      x-unit: nanoseconds
      minimum: 0

    end_ts: # previously named "end"
      type: integer
      format: int64 # previously uint64
      description: Timestamp when instruction finished execution.
      x-unit: nanoseconds
      minimum: 0

    duration_ns: # previously named "duration"
      type: integer
      format: int64 # previously uint64
      description: Duration of instruction execution.
      x-unit: nanoseconds
      minimum: 0

    id:
      type: integer
      format: int64
      description: Unique identifier for this aggeregated set of DMA packets.
      minimum: 0

    pcore_idx: # previously named "subgraph"
      type: integer
      format: int64
      description: Index of the physical NeuronCore within a Logical NeuronCore (LNC). A Logical NeuronCore is a group of physical NeuronCores. For LNC2 this field can have a value of either 0 or 1.
      minimum: 0

    block_id:
      type: integer
      format: int32
      description: A block_id is used by the compiler to logically identify the transfer of one or more tensors. The transfer is fulfilled on a Neuron Device by a set of DMA packets. A block_id only unique per combination of dma_engine, dma_queue, function, and subgraph.
      minimum: 0

    queue_idx: # previously named "dma_queue"
      type: integer
      format: int64 # previously string
      description: Queue index where this DMA operation was queued.
      minimum: 0

    queue_name: # previously named "subgroup"
      type: string
      description: Queue name where this DMA operation was queued.
      example: qScalarSpillReload0-Q1-E64

    queue_type:
      type: string
      description: The type of the DMA queue that this packet belongs to. Used to identify the origin, and contents of the DMA packet. 'software_dynamic' packets are generated by the Gpsimd cores. 'hardware_dynamic' packets are generated by dedicated DGE hardware. 'instruction', 'input', 'output', and 'data' packets are generated by the compiler.
      example: ["instruction", "input", "output", "data", "software_dynamic", "hardware_dynamic", "unknown"]

    op:
      type: string
      description: DMA operation type.
      example: read

    variable:
      type: string
      description: Variable or tensor name associated with the data being transferred.
      example: input_tensor

    read_bytes: # previously named "read_size"
      type: integer
      format: int64 # previously uint64
      description: Size in bytes of data read during this operation.
      x-unit: bytes
      minimum: 0

    write_bytes: # previously named "write_size"
      type: integer
      format: int64 # previously uint64
      description: Size in bytes of data written during this operation.
      x-unit: bytes
      minimum: 0

    transfer_bytes: # previously named "transfer_size"
      type: integer
      format: int64 # previously uint64
      description: Size in bytes of data transferred during this operation.
      x-unit: bytes
      minimum: 0

    throughput: # previously named "transfer_rate"
      type: number
      format: float
      description: The throughput of this DMA operation in bytes per second. Calculated as the amount of data transferred divided by the transfer duration.
      x-unit: bytes_per_second
      minimum: 0.0

    source:
      type: string
      description: Source memory location(s) for the DMA transfer.
      example: "[SB]"

    dest:
      type: string
      description: Destination memory location(s) for the DMA transfer.
      example: "[OUTPUT]"

    semaphore_id:
      type: string
      description: Identifier of semaphore used for synchronization.
      example: S[10] (qGpSimdPIO0)

    modular_flow_function: # prevously named "function"
      type: string
      description: Modular flow function name and instance associated with this DMA operation.
      example: sg0000:0

    read_sbuf_partitions: # previously named "source_sb_partitions"
      type: string
      description: State Buffer partitions read from during this DMA operation.
      example: 0,1

    read_num_sbuf_partitions: # previously named "source_num_sb_partitions"
      type: integer
      format: int32
      description: Number of State Buffer partitions read from during this DMA operation.
      minimum: 0

    read_shape:
      type: string
      description: Multi-dimensional shape read from source memory.
      example: "[1024, 512]"

    read_offset: # previously named "source_offset"
      type: string
      description: Byte offset within the source memory region.
      example: "[0x2000]"

    read_steps: # previously named "source_steps"
      type: string
      description: Stride of reads from source location.
      example: "[1, 32768]"

    write_sbuf_partitions: # previously named "dest_sb_partitions"
      type: string
      description: State Buffer partitions written to during this DMA operation.
      example: 0-15

    write_num_sbuf_partitions: # previously named "dest_num_sb_partitions"
      type: integer
      format: int32
      description: Number of State Buffer partitions written to during this DMA operation.
      minimum: 0

    write_shape:
      type: string
      description: Multi-dimensional shape written to destination memory.
      example: "[1024, 512]"

    write_offset: # previously named "dest_offset"
      type: string
      description: Byte offset within the destination memory region.
      example: "[0x1000]"

    write_steps: # previously named "dest_steps"
      type: string
      description: The destination stride.
      example: "[1, 32]"

    is_transpose_mode: # previously named "transpose_mode"
      type: boolean # previously string
      description: Indicates if transpose mode is enabled.
      example: True

    transpose_element_size:
      type: string
      description: Element size for transpose operations.
      example: "[2]"

    transpose_shape:
      type: string
      description: Shape descriptor for transpose operation.
      example: "[1024, 4, 512]"

    transpose_from_shape:
      type: string
      description: Source shape for transpose operations.
      example: "[4, 1024, 512]"

    transpose_to_shape:
      type: string
      description: Target shape for transpose operation.
      example: "[1024, 512, 4]"

    transpose_unroll_factor:
      type: string
      description: Unroll factor for transpose operation.
      example: "[128, 32, 1, 2]"

    trigger: # TODO: replace this field with usage of the flow table (ticket: V1946062344)
      type: integer
      format: int64 # previously uint64
      description: Start timestamp of the instruction that triggered this DMA. This DMA had a dependency on that instruction.
      minimum: 0

    completion: # TODO: replace this field with usage of the flow table (ticket: V1946062344)
      type: integer
      format: int64 # previously uint64
      description: End timestamp of the instruction that triggered this DMA. This DMA had a dependency on that instruction.
      minimum: 0

  required:
    - start_ts
    - end_ts
    - duration_ns
    - id
    - block_id
    - engine_idx
    - queue_idx
    - queue_name
    - op
    - variable
    - read_bytes
    - write_bytes
    - transfer_bytes
    - throughput
    - source
    - dest
    - semaphore_id
    - read_sbuf_partitions
    - read_num_sbuf_partitions
    - read_shape
    - read_offset
    - read_steps
    - write_sbuf_partitions
    - write_num_sbuf_partitions
    - write_shape
    - write_offset
    - write_steps