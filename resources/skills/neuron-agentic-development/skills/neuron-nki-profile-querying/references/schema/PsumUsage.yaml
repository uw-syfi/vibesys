PsumUsage:
  description: PSUM memory bank utilization metrics during execution.
  properties:
    timestamp:
      type: integer
      format: int64
      description: Timestamp for this usage measurement.
      x-unit: nanoseconds
      minimum: 0

    avg_util_percent:
      type: number
      format: float
      description: Average fullness across all PSUM memory banks.
      x-unit: percent
      minimum: 0.0
      maximum: 1.0

    bank_0_util_percent:
      type: number
      format: float
      description: Fullness percentage of PSUM memory bank 0.
      x-unit: percent
      minimum: 0.0
      maximum: 1.0

    bank_1_util_percent:
      type: number
      format: float
      description: Fullness percentage of PSUM memory bank 1.
      x-unit: percent
      minimum: 0.0
      maximum: 1.0

    bank_2_util_percent:
      type: number
      format: float
      description: Fullness percentage of PSUM memory bank 2.
      x-unit: percent
      minimum: 0.0
      maximum: 1.0

    bank_3_util_percent:
      type: number
      format: float
      description: Fullness percentage of PSUM memory bank 3.
      x-unit: percent
      minimum: 0.0
      maximum: 1.0

    bank_4_util_percent:
      type: number
      format: float
      description: Fullness percentage of PSUM memory bank 4.
      x-unit: percent
      minimum: 0.0
      maximum: 1.0

    bank_5_util_percent:
      type: number
      format: float
      description: Fullness percentage of PSUM memory bank 5.
      x-unit: percent
      minimum: 0.0
      maximum: 1.0

    bank_6_util_percent:
      type: number
      format: float
      description: Fullness percentage of PSUM memory bank 6.
      x-unit: percent
      minimum: 0.0
      maximum: 1.0

    bank_7_util_percent:
      type: number
      format: float
      description: Fullness percentage of PSUM memory bank 7.
      x-unit: percent
      minimum: 0.0
      maximum: 1.0

    pcore_idx:
      type: integer
      format: int64
      description: Index of the physical NeuronCore within a Logical NeuronCore (LNC). A Logical NeuronCore is a group of physical NeuronCores. For LNC2 this field can have a value of either 0 or 1.
      minimum: 0

  required:
    - timestamp