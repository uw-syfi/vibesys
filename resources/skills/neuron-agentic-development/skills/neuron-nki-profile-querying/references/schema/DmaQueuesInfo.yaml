DmaQueuesInfo:
  description: Information about DMA queues. Each DMA engine has 16 DMA queues. DMA queues exist for each compute engine (ex. Tensor engine) and data type (ex. weights). The items in the queues are DMA descriptors.
  properties:
    name:
      type: string
      description: The name of the DMA queue.
      example: qSyncDynamicHW

    type:
      type: string
      description: The type of DMA queue.
      example: weights

    pcore_idx: # previously named "subgraph"
      type: integer
      format: int64
      description: Index of the physical NeuronCore within a Logical NeuronCore (LNC). A Logical NeuronCore is a group of physical NeuronCores. For LNC2 this field can have a value of either 0 or 1.
      minimum: 0

    idx:
      type: integer
      format: int64
      description: The index of this DMA queue within the DMA engine.
      minimum: 0

    engine_idx: # previously named "eng_idx"
      type: integer
      format: int64
      description: The index of the DMA engine that this DMA queue belongs to.
      minimum: 0

    axi_port:
      type: integer
      format: int64
      description: The AXI port used by this DMA queue.
      minimum: 0

    dram_channel:
      type: integer
      format: int64
      description: The DRAM channel used by this DMA queue.
      minimum: 0

  required:
    - name
    - type
    - pcore_idx
    - idx
    - engine_idx
    - axi_port
    - dram_channel