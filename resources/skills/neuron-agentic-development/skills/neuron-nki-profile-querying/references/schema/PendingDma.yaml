PendingDma:
  description: Outstanding DMA operations that are queued.
  properties:
    timestamp:
      type: integer
      format: int64
      description: Time of pending DMA measurement.
      x-unit: nanoseconds
      minimum: 0

    value:
      type: integer
      format: int32
      description: Number of pending DMA operations queued.
      minimum: 0

    pcore_idx: # previously named "subgraph"
      type: integer
      format: int64
      description: Index of the physical NeuronCore within a Logical NeuronCore (LNC). A Logical NeuronCore is a group of physical NeuronCores. For LNC2 this field can have a value of either 0 or 1.
      minimum: 0

  required:
    - timestamp
    - value