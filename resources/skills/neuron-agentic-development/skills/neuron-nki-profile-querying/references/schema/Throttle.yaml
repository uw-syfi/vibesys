Throttle:
  description: Hardware throttling notification events that track thermal or power throttling on NeuronCores.
  properties:
    duration:
      type: integer
      format: int64
      description: Duration of the throttling event.
      x-unit: nanoseconds
      minimum: 0

    k:
      type: integer
      format: int32
      description: Allowed utilization level value used to calculate throttling limit (utilization_limit = k/n, throttling = 1 - utilization_limit).
      minimum: 0

    n:
      type: integer
      format: int32
      description: Maximum possible utilization level value used to calculate throttling limit (utilization_limit = k/n, throttling = 1 - utilization_limit).
      minimum: 0

    timestamp:
      type: integer
      format: int64
      description: Timestamp when the throttling event occurred.
      x-unit: nanoseconds
      minimum: 0

    type:
      type: string
      description: Type of throttling (e.g., "activity_0", "activity_1", "unknown").
      example: activity_0

    pcore_idx:
      type: integer
      format: int64
      description: Index of the physical NeuronCore within a Logical NeuronCore (LNC). A Logical NeuronCore is a group of physical NeuronCores. For LNC2 this field can have a value of either 0 or 1.
      minimum: 0

  required:
    - duration
    - k
    - n
    - timestamp
    - type