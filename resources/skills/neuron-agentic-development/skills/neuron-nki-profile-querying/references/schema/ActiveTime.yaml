ActiveTime:
  description: A timeline of when engines are active. Engines are considered active when it is processing at least one instruction (excluding semaphore waits).
              This is created by merging the intervals of all instructions on the engine. This is different than the instruction table, which gives individual
              instructions without merging and includes all details about individual instructions.
  properties:
    start_ts:
      type: integer
      format: int64
      description: Timestamp when activity on this engine starts.
      x-unit: nanoseconds
      minimum: 0

    end_ts:
      type: integer
      format: int64
      description: Timestamp when activity on this engine ends.
      x-unit: nanoseconds
      minimum: 0

    engine:
      type: string
      description: Compute engine that this active time period corresponds to.
      example: tensor

    pcore_idx:
      type: integer
      format: int64
      description: Index of the physical NeuronCore within a Logical NeuronCore (LNC). A Logical NeuronCore is a group of physical NeuronCores. For LNC2 this field can have a value of either 0 or 1.
      minimum: 0

    duration_ns:
      type: integer
      format: int64
      description: The duration of the active time period.
      x-unit: nanoseconds
      minimum: 0

  required:
    - start_ts
    - end_ts
    - engine
    - pcore_idx
    - duration_ns