HostMemUsage:
  description: Host memory utilization time-series metrics. Each row represents a memory usage sample for an instance.
  properties:
    timestamp:
      type: integer
      format: int64
      description: Timestamp for this memory utilization measurement.
      x-unit: nanoseconds
      minimum: 0

    used_bytes:
      type: integer
      format: int64
      description: Amount of host memory currently in use.
      x-unit: bytes
      minimum: 0

    used_percent:
      type: number
      format: float
      description: Host memory utilization percentage at this timestamp. Calculated as (used_bytes / memory_capacity) * 100.
      x-unit: percent
      minimum: 0.0
      maximum: 100.0

    instance_id:
      type: string
      description: Identifier for the instance on which this memory utilization was measured.
      example: i-0b1ea78ca2865fd32

    ultraserver_id:
      type: integer
      format: int64
      description: Unique UltraServer ID if this measurement was captured on an UltraServer instance.
      minimum: 0

    ultraserver_instance_index:
      type: integer
      format: int64
      description: The instance index within the UltraServer on which this measurement was captured.
      minimum: 0

  required:
    - timestamp
    - used_bytes
    - used_percent
    - instance_id