SbufUsage:
  description: State Buffer (SB) memory partition utilization metrics during execution.
  properties:
    timestamp:
      type: integer
      format: int64
      description: Timestamp for this usage measurement.
      x-unit: nanoseconds
      minimum: 0

    avg_util_percent:
      type: number
      format: float
      description: Average utilization across all State Buffer partitions.
      x-unit: percent
      minimum: 0.0
      maximum: 1.0

    partition_0_util_percent:
      type: number
      format: float
      description: Fullness percentage of State Buffer partition 0.
      x-unit: percent
      minimum: 0.0
      maximum: 1.0

    partition_32_util_percent:
      type: number
      format: float
      description: Fullness percentage of State Buffer partition 32.
      x-unit: percent
      minimum: 0.0
      maximum: 1.0

    partition_64_util_percent:
      type: number
      format: float
      description: Fullness percentage of State Buffer partition 64.
      x-unit: percent
      minimum: 0.0
      maximum: 1.0

    partition_96_util_percent:
      type: number
      format: float
      description: Fullness percentage of State Buffer partition 96.
      x-unit: percent
      minimum: 0.0
      maximum: 1.0

    pcore_idx:
      type: integer
      format: int64
      description: Index of the physical NeuronCore within a Logical NeuronCore (LNC). A Logical NeuronCore is a group of physical NeuronCores. For LNC2 this field can have a value of either 0 or 1.
      minimum: 0

  required:
    - timestamp