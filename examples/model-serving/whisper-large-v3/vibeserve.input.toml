version = 1

[agent]
domain = "llm-serving"

[accuracy]
command = ["uv", "run", "python", "accuracy_checker/checker.py"]
timeout_seconds = 300

[benchmark]
command = ["uv", "run", "python", "benchmark/benchmark.py"]
timeout_seconds = 600

[benchmark.result]
json_argument = "--output-json"
metric = "requests_per_second"
