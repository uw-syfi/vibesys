version = 1
name = "train-ticket-stateful-randomized"
application = "train-ticket"

[load]
model = "closed_loop"
rate = 0
duration_seconds = 30
warmup_seconds = 2
concurrency = 128
timeout_seconds = 5
repetitions = 1
seed = 1
min_offered_rate_ratio = 0.95

[application_config]
records = 32

[[targets]]
name = "config"
protocol = "http"
address = "http://localhost:8080"
session_policy = "reuse"

[[targets]]
name = "station"
protocol = "http"
address = "http://localhost:8080"
session_policy = "reuse"

[[targets]]
name = "train"
protocol = "http"
address = "http://localhost:8080"
session_policy = "reuse"

[[targets]]
name = "travel"
protocol = "http"
address = "http://localhost:8080"
session_policy = "reuse"

[[targets]]
name = "route"
protocol = "http"
address = "http://localhost:8080"
session_policy = "reuse"

[[targets]]
name = "price"
protocol = "http"
address = "http://localhost:8080"
session_policy = "reuse"

[[operations]]
name = "list_config"
target = "config"
weight = 6
tags = ["read", "list"]

[[operations]]
name = "list_station"
target = "station"
weight = 6
tags = ["read", "list"]

[[operations]]
name = "list_train"
target = "train"
weight = 6
tags = ["read", "list"]

[[operations]]
name = "list_travel"
target = "travel"
weight = 6
tags = ["read", "list"]

[[operations]]
name = "list_route"
target = "route"
weight = 6
tags = ["read", "list"]

[[operations]]
name = "list_price"
target = "price"
weight = 5
tags = ["read", "list"]

[[operations]]
name = "read_config"
target = "config"
weight = 5
tags = ["read", "point"]

[[operations]]
name = "read_station"
target = "station"
weight = 4
tags = ["read", "secondary-index"]

[[operations]]
name = "read_train"
target = "train"
weight = 4
tags = ["read", "point"]

[[operations]]
name = "read_travel"
target = "travel"
weight = 4
tags = ["read", "point"]

[[operations]]
name = "read_route"
target = "route"
weight = 4
tags = ["read", "point"]

[[operations]]
name = "read_price"
target = "price"
weight = 4
tags = ["read", "secondary-index"]

[[operations]]
name = "update_read_config"
target = "config"
weight = 6
tags = ["write", "read-your-write"]

[[operations]]
name = "update_read_station"
target = "station"
weight = 6
tags = ["write", "read-your-write", "secondary-index"]

[[operations]]
name = "update_read_train"
target = "train"
weight = 6
tags = ["write", "read-your-write"]

[[operations]]
name = "update_read_travel"
target = "travel"
weight = 6
tags = ["write", "read-your-write"]

[[operations]]
name = "update_read_route"
target = "route"
weight = 6
tags = ["write", "read-your-write"]

[[operations]]
name = "update_read_price"
target = "price"
weight = 5
tags = ["write", "read-your-write", "secondary-index"]

[[operations]]
name = "create_read_delete_config"
target = "config"
weight = 5
tags = ["write", "read-your-write", "delete"]

[objective]
name = "logical_operations_per_second"
metric = "operations_per_second"
direction = "maximize"
unit = "operations/s"

[constraints]
max_error_rate = 0.0
min_operations_per_type = 1

[profiles.offered-load]
model = "open_loop"
rate = 100
concurrency = 128
