version = 1

[agent]
domain = "microservices"

[evaluator]
source = "../../evaluators/microservice"

[accuracy]
command = ["uv", "run", "python", "accuracy_checker/checker.py"]
timeout_seconds = 120

[benchmark]
command = [
  "go", "-C", "_evaluator/microservice",
  "run", "./cmd/microbench",
  "--workload", "../../benchmark/workload.toml",
]
timeout_seconds = 300

[benchmark.result]
json_argument = "--output-json"
metric = "primary_value"
