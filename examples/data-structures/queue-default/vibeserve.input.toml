version = 1

[workspace]
seed = "../../starters/queue-rs"

[evaluator]
source = "../../evaluators/queue"

[accuracy]
command = [
  "go", "-C", "_evaluator/queue",
  "run", ".", "check", "--workspace", "../..",
  "--scenario", "all", "--operations", "24", "--trials", "50",
]
timeout_seconds = 120

[benchmark]
command = [
  "go", "-C", "_evaluator/queue",
  "run", ".", "benchmark", "--workspace", "../..",
  "--scenario", "all", "--repetitions", "3",
]
timeout_seconds = 300
